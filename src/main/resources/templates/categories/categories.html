<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>Categories</title>
    </head>

    <body>
        Categories:
        <div th:each="category : ${categories}">
            <a th:href="@{'/category/' + ${category.id}}" th:text="|${category.id}. ${category.name}|">Category</a>
        </div>
    </body>
</html>
