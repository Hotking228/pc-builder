<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>Builder</title>
    </head>

    <body>
        <div th:each="component : ${build.get()}" th:text="|Название: ${component.name} Цена: ${component.price}|">Добавленное комплектующее</div>
        <br>
        <br>
        <div th:each="category : ${categories}">
            <a th:href="@{'/builder/select/' + ${category.slug}}" th:text="|Добавить ${category.name}|">Добавить категорию</a>
        </div>
    </body>
</html>
