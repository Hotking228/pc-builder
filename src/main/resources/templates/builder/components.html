<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>Component</title>
    </head>

    <body>
        <div th:each="component : ${components}">
            <a th:href="@{'/builder/component/' + ${component.id}}" th:text="${component.name}"></a>
            <form action="/builder" method="post">
                <input type="hidden" th:value="${component.id}" name="component">
                <button type="submit">Добавить</button>
            </form><br>
        </div>

        <div>
            <form th:each="i : ${#numbers.sequence(0, pageCount, 1)}" th:action="@{'/builder/select/' + ${slug}}">
                <input type="hidden" th:value="${i}" name="pageNumber">
                <button type="submit" th:text="${i}">Номер страницы</button>
            </form>
        </div>

        <div>
            <form th:action="@{'/builder/select/' + ${slug}}" method="get" th:object="${page}">

                <label for="minPrice"> Минимальная цена:
                    <input name="minPrice" id="minPrice" th:value="*{minPrice}" type="text">
                </label>

                <label for="maxPrice">Максимальная цена:
                    <input name="minPrice" id="maxPrice" th:value="*{maxPrice}" type="text">
                </label><br>

                <label for="manufacturer">Производитель:
                    <input name="manufacturer" id="manufacturer" th:value="*{manufacturer}" type="text">
                </label>

                <button type="submit">Применить</button>
            </form>
        </div>
    </body>
</html>
